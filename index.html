<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mairie - Paulinet</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {font-family: Arial, sans-serif; margin:0; background:#f4f6f8;}
    header {background:#2c6e49; color:white; padding:15px; text-align:center;top:25px;}
    .container {padding:15px;}
    .grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      text-align:center;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
    .hidden {display:none;}
    .nav {
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:white;
      display:flex;
      justify-content:space-around;
      border-top:1px solid #ccc;
      padding:10px 0;
    }
    .nav div {cursor:pointer;font-size: 20px;}
    .list-item {
      background:white;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
    }
    .update-banner {
      position:fixed;
      top:0;
      left:0;
      right:0;
      background:#ff9800;
      color:white;
      text-align:center;
      padding:8px;
      display:block;
      z-index:1000;
    }
    #refreshBtn {
    font-weight: bold;
    }
    #notifDot {
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
  </style>
</head>
<body>

  <!--
  <div id="updateInfo" style="display:block; background:#ff9800; color:white; padding:8px; text-align:center;">
  Afin d'avoir les dernières informations, vous pouvez actualiser la page.
  <button onclick="loadNews()">Actualiser</button>
  </div>

<div id="updateBanner" class="update-banner">
  Afin d'avoir les dernières informations, vous pouvez actualiser la page - <button onclick="refreshApp()">Actualiser</button>
</div>
-->
    
<header>
  <h2><img src="icon-32.png" /> - Mairie de Paulinet</h2>
</header>

<div id="home" class="container">
  <div class="grid">
    <div class="card" onclick="show('news')">📰 Actualités</div>
    <div class="card" onclick="show('agenda')">📅 Agenda</div>
    <div class="card" onclick="show('travaux')">🏗️ Travaux</div>
    <div class="card" onclick="show('elus')">👥 Élus</div>
    <div class="card" onclick="show('infos')">📍 Infos</div>
  </div>
</div>

<div id="news" class="container hidden">
  <h3>Actualités</h3>
</div>

<div id="agenda" class="container hidden">
  <h3>Agenda</h3>
</div>

<div id="travaux" class="container hidden">
  <h3>Travaux</h3>
</div>

<div id="elu.e.s" class="container hidden">
  <h3>Élus</h3>
</div>
<br/>

<div id="infos" class="container hidden">
  <h3>Infos pratiques</h3>
</div>

<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('news')">📰</div>
  <div onclick="show('agenda')">📅</div>
  <div onclick="show('travaux')">🏗️</div>
  <div onclick="show('elus')">👥</div>

  <!-- bouton refresh -->
  <div id="refreshBtn" onclick="loadNews()" style="position:relative;">
    🔄
    <span id="notifDot" style="
      display:none;
      position:absolute;
      top:2px;
      right:8px;
      width:8px;
      height:8px;
      background:red;
      border-radius:50%;
    "></span>
  </div>
</div>

<script>
  function show(id) {
    document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function refreshApp() {
    window.location.reload();
  }

  document.addEventListener('DOMContentLoaded', () => {
    show('home');
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => {
        reg.onupdatefound = () => {
          const newWorker = reg.installing;
          newWorker.onstatechange = () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              document.getElementById('updateBanner').style.display = 'block';
            }
          };
        };
      })
      .catch(err => console.log('SW error:', err));
  }
  //News
 let lastData = '';

function loadNews() {
  fetch('news.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('news');
      container.innerHTML = '<h3>Actualités</h3>';

      data.forEach(item => {
        container.innerHTML += `
          <div class="list-item">
            <strong>${item.title}</strong><br>
            ${item.date}<br>
            ${item.content}
          </div>
        `;
      });

      lastData = JSON.stringify(data);

      // 🔴 cacher la pastille
      document.getElementById('notifDot').style.display = 'none';
    });
}


  function checkForUpdate() {
  fetch('news.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastData && newData !== lastData) {
        // 🔴 afficher la pastille
        document.getElementById('notifDot').style.display = 'block';
      }
    });
}

  // Agenda
  let lastAgendaData = '';
  
  function loadAgenda() {
  fetch('agenda.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('agenda');
      container.innerHTML = '<h3>Agenda</h3>';

      data.forEach(item => {
        container.innerHTML += `
          <div class="list-item">
            <strong>${item.title}</strong><br>
            ${item.date}<br>
            ${item.content}
          </div>
        `;
      });

      lastAgendaData = JSON.stringify(data);

      // cacher la pastille agenda si tu en mets une
      const dot = document.getElementById('notifDotAgenda');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur agenda:', err));
}

  function checkAgendaUpdate() {
  fetch('agenda.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastAgendaData && newData !== lastAgendaData) {
        const dot = document.getElementById('notifDotAgenda');
        if (dot) dot.style.display = 'block';
      }
    });
}

  // Travaux
  let lastTravauxData = '';
  
  function loadTravaux() {
  fetch('travaux.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('travaux');
      container.innerHTML = '<h3>Travaux</h3>';

      data.forEach(item => {

        // couleur selon statut
        let color = '#999';
        if (item.status === 'en cours') color = 'orange';
        if (item.status === 'terminé') color = 'green';
        if (item.status === 'prévu') color = 'gray';

        container.innerHTML += `
          <div class="list-item">
            <strong>${item.title}</strong><br>
            <span style="color:${color}; font-weight:bold;">
              ${item.status}
            </span><br>
            ${item.date}<br>
            ${item.content}
          </div>
        `;
      });

      lastTravauxData = JSON.stringify(data);

      // cacher pastille
      const dot = document.getElementById('notifDotTravaux');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur travaux:', err));
}

function checkTravauxUpdate() {
  fetch('travaux.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastTravauxData && newData !== lastTravauxData) {
        const dot = document.getElementById('notifDotTravaux');
        if (dot) dot.style.display = 'block';

        // notification (optionnel)
        sendNotification(
          "Mairie de Paulinet",
          "Mise à jour des travaux"
        );
      }
    });
}

  // Élus
let lastElusData = '';

  function loadElus() {
  fetch('elus.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('elus');
      container.innerHTML = '<h3>Élus</h3>';

      data.forEach(item => {
        container.innerHTML += `
          <div class="list-item" style="display:flex; align-items:center; gap:10px;">
            
            <img src="${item.photo || 'default.png'}"
                 style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
            
            <div>
              <strong>${item.name}</strong><br>
              ${item.role}<br>
              <span style="font-size:12px; color:#666;">
                ${item.contact || ''}
              </span>
            </div>

          </div>
        `;
      });

      lastElusData = JSON.stringify(data);

      // cacher pastille
      const dot = document.getElementById('notifDotElus');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur élus:', err));
}

  function checkElusUpdate() {
  fetch('elus.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastElusData && newData !== lastElusData) {
        const dot = document.getElementById('notifDotElus');
        if (dot) dot.style.display = 'block';

        sendNotification(
          "Mairie de Paulinet",
          "Mise à jour des élus"
        );
      }
    });
}

  // Infos
  let lastInfosData = '';

  function loadInfos() {
  fetch('infos.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('infos');
      container.innerHTML = '<h3>Infos pratiques</h3>';

      data.forEach(section => {
        container.innerHTML += `
          <div class="list-item">
            <strong>${section.title}</strong><br>
            ${section.content}
          </div>
        `;
      });

      lastInfosData = JSON.stringify(data);

      const dot = document.getElementById('notifDotInfos');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur infos:', err));
}

  function checkInfosUpdate() {
  fetch('infos.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastInfosData && newData !== lastInfosData) {
        const dot = document.getElementById('notifDotInfos');
        if (dot) dot.style.display = 'block';

        sendNotification(
          "Mairie de Paulinet",
          "Mise à jour des informations pratiques"
        );
      }
    });
}

  
  

// Vérification toutes les 2 minutes
setInterval(checkForUpdate, 120000);
setInterval(checkAgendaUpdate, 120000);
setInterval(checkTravauxUpdate, 120000);
setInterval(checkElusUpdate, 120000);
setInterval(checkInfosUpdate, 120000);
  

  loadNews();
  loadAgenda();
  loadTravaux();
  loadElus();
  loadInfos();
  
</script>

</body>
</html>
