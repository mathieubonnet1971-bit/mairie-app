<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mairie - Paulinet</title>

  <link rel="manifest" href="manifest.json">
  <script src="js/app.js"></script>

  <style>
    body {font-family: Arial, sans-serif; margin:0; background:#f4f6f8;}
    header {background:#2c6e49; color:white; padding:15px; text-align:center;top:25px;}
    .container {
  padding: 15px;
  padding-bottom: 70px; /* évite chevauchement avec nav */
}
    .grid {display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      text-align:center;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
    .hidden {display:none;}
    .nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #ddd;
  padding: 10px 0;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
}

    .nav div {cursor:pointer;font-size: 20px;}
    .list-item {
  background: white;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  transition: transform 0.1s ease;
}
    .update-banner {
      position:fixed;
      top:0;
      left:0;
      right:0;
      background:#ff9800;
      color:white;
      text-align:center;
      padding:8px;
      display:block;
      z-index:1000;
    }
    #refreshBtn {
    font-weight: bold;
    }
    #notifDot {
  animation: pulse 1s infinite;
}
    
  img {
  border: 2px solid #2c6e49;
}

.list-item:active {
  transform: scale(0.98);
}

    h3 {
  margin-bottom: 15px;
  color: #2c6e49;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
  </style>
</head>
<body>

  <!--
  <div id="updateInfo" style="display:block; background:#ff9800; color:white; padding:8px; text-align:center;">
  Afin d'avoir les dernières informations, vous pouvez actualiser la page.
  <button onclick="loadNews()">Actualiser</button>
  </div>

<div id="updateBanner" class="update-banner">
  Afin d'avoir les dernières informations, vous pouvez actualiser la page - <button onclick="refreshApp()">Actualiser</button>
</div>
-->
    
<header>
  <h2><div style="padding-top:-15px;"><img src="images/paulinet-32.png" /></div> Mairie de Paulinet</h2>
</header>

<div id="home" class="container">
  <div class="grid">
    <div class="card" onclick="show('news')">📰 Actualités</div>
    <div class="card" onclick="show('agenda')">📅 Agenda</div>
    <div class="card" onclick="show('travaux')">🏗️ Travaux</div>
    <div class="card" onclick="show('elus')">👥 Élu.e.s</div>
    <div class="card" onclick="show('infos')">📍 Infos</div>
  </div>
</div>

<div id="news" class="container hidden">
  <h3>Actualités</h3>
</div>

<div id="agenda" class="container hidden">
  <h3>Agenda</h3>
</div>

<div id="travaux" class="container hidden">
  <h3>Travaux</h3>
</div>

<div id="elus" class="container hidden">
  <h3>Élu.e.s</h3>
</div>
<br/><br/>

<div id="infos" class="container hidden">
  <h3>Infos pratiques</h3>
</div>

<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('news')">📰</div>
  <div onclick="show('agenda')">📅</div>
  <div onclick="show('travaux')">🏗️</div>
  <div onclick="show('elus')">👥</div>

  <!-- bouton refresh -->
  <div id="refreshBtn" onclick="loadNews();loadAgenda();loadTravaux();loadElus();loadInfos();" style="position:relative;">
    🔄
    <span id="notifDot" style="
      display:none;
      position:absolute;
      top:2px;
      right:8px;
      width:8px;
      height:8px;
      background:red;
      border-radius:50%;
    "></span>
  </div>
</div>

<script>
  function show(id) {
    document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => {
        console.log('SW OK scope:', reg.scope);
      })
      .catch(err => console.log('SW erreur:', err));
  }
});

  function refreshApp() {
    window.location.reload();
  }

  document.addEventListener('DOMContentLoaded', () => {
    show('home');
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => {
        reg.onupdatefound = () => {
          const newWorker = reg.installing;
          newWorker.onstatechange = () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              document.getElementById('updateBanner').style.display = 'block';
            }
          };
        };
      })
      .catch(err => console.log('SW error:', err));
  }
  //News
 let lastData = '';

function loadNews() {
  fetch('data/news.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('news');
      container.innerHTML = '<h3>Actualités</h3>';

      data.forEach(item => {
        container.innerHTML += `
          <div class="list-item">
            <strong>${item.title}</strong><br>
            ${item.date}<br>
            ${item.content}
          </div>
        `;
      });

      lastData = JSON.stringify(data);

      // 🔴 cacher la pastille
      document.getElementById('notifDot').style.display = 'none';
    });
}


  function checkForUpdate() {
  fetch('data/news.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastData && newData !== lastData) {
        // 🔴 afficher la pastille
        document.getElementById('notifDot').style.display = 'block';
      }
    });
}

  // Agenda
  let lastAgendaData = '';
  
  function loadAgenda() {
  fetch('data/agenda.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('agenda');
      container.innerHTML = '<h3>Agenda</h3>';

      data.forEach(item => {
        container.innerHTML += `
          <div class="list-item">
            <strong>${item.title}</strong><br>
            ${item.date}<br>
            ${item.content}
          </div>
        `;
      });

      lastAgendaData = JSON.stringify(data);
       // 🔴 cacher la pastille
      document.getElementById('notifDot').style.display = 'none';

      // cacher la pastille agenda si tu en mets une
      const dot = document.getElementById('notifDotAgenda');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur agenda:', err));
}

  function checkAgendaUpdate() {
  fetch('data/agenda.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastAgendaData && newData !== lastAgendaData) {
        const dot = document.getElementById('notifDotAgenda');
        if (dot) dot.style.display = 'block';
         // 🔴 afficher la pastille
        document.getElementById('notifDot').style.display = 'block';
      }
    });
}

  // Travaux
  let lastTravauxData = '';
  
  function loadTravaux() {
  fetch('data/travaux.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('travaux');
      container.innerHTML = '<h3>Travaux</h3>';

      data.forEach(item => {

        // couleur selon statut
        let color = '#999';
        if (item.status === 'En cours') color = 'orange';
        if (item.status === 'Terminé') color = 'green';
        if (item.status === 'Prévu') color = 'gray';
        let icon = '⚫';
        if (item.status === 'En cours') icon = '🟡';
        if (item.status === 'Terminé') icon = '🟢';
        if (item.status === 'Prévu') icon = '⚫';

        container.innerHTML += `
          <div class="list-item">
            <strong>${item.title}</strong><br>
            <span style="font-weight:bold;">
              ${icon} ${item.status}
            </span><br>
            ${item.date}<br>
            ${item.content}
          </div>
        `;
      });

      lastTravauxData = JSON.stringify(data);

       // 🔴 cacher la pastille
      document.getElementById('notifDot').style.display = 'none';

      // cacher pastille
      const dot = document.getElementById('notifDotTravaux');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur travaux:', err));
}

function checkTravauxUpdate() {
  fetch('data/travaux.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastTravauxData && newData !== lastTravauxData) {
        const dot = document.getElementById('notifDotTravaux');
        if (dot) dot.style.display = 'block';
         // 🔴 afficher la pastille
        document.getElementById('notifDot').style.display = 'block';

        // notification (optionnel)
        sendNotification(
          "Mairie de Paulinet",
          "Mise à jour des travaux"
        );
      }
    });
}

  // Élus
let lastElusData = '';

  function loadElus() {
  fetch('data/elus.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('elus');
      container.innerHTML = '<h3>Élu.e.s</h3>';

      data.forEach(item => {
        container.innerHTML += `
  <div class="list-item" style="display:flex; align-items:center; gap:12px;">
    
    <img src="images/${item.photo || 'default.png'}"
         style="
           width:55px;
           height:55px;
           border-radius:50%;
           object-fit:cover;
           border:2px solid #2c6e49;
         ">
    
    <div>
      <strong style="font-size:16px;">${item.name}</strong><br>
      <span style="color:#2c6e49; font-weight:bold;">
        ${item.role}
      </span><br>
      <span style="font-size:12px; color:#666;">
        <a href="mailto:${item.contact_mel || ''}</a>
      </span>
      <br/>
      <span style="font-size:12px; color:#666;"></a>
        <a href="tel:${item.contact_tel || ''}
      </span>
    </div>

  </div>
`;
      });

      lastElusData = JSON.stringify(data);
       // 🔴 cacher la pastille
      document.getElementById('notifDot').style.display = 'none';

      // cacher pastille
      const dot = document.getElementById('notifDotElus');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur élus:', err));
}

  function checkElusUpdate() {
  fetch('data/elus.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastElusData && newData !== lastElusData) {
        const dot = document.getElementById('notifDotElus');
        if (dot) dot.style.display = 'block';
         // 🔴 afficher la pastille
        document.getElementById('notifDot').style.display = 'block';

        sendNotification(
          "Mairie de Paulinet",
          "Mise à jour des élus"
        );
      }
    });
}

  // Infos
  let lastInfosData = '';

  function loadInfos() {
  fetch('data/infos.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('infos');
      container.innerHTML = '<h3>Infos pratiques</h3>';

      data.forEach(section => {
        container.innerHTML += `
          <div class="list-item">
            <strong>${section.title}</strong><br>
            ${section.content}
          </div>
        `;
      });

      lastInfosData = JSON.stringify(data);
       // 🔴 cacher la pastille
      document.getElementById('notifDot').style.display = 'none';

      const dot = document.getElementById('notifDotInfos');
      if (dot) dot.style.display = 'none';
    })
    .catch(err => console.error('Erreur infos:', err));
}

  function checkInfosUpdate() {
  fetch('data/infos.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const newData = JSON.stringify(data);

      if (lastInfosData && newData !== lastInfosData) {
        const dot = document.getElementById('notifDotInfos');
        if (dot) dot.style.display = 'block';
         // 🔴 afficher la pastille
        document.getElementById('notifDot').style.display = 'block';

        sendNotification(
          "Mairie de Paulinet",
          "Mise à jour des informations pratiques"
        );
      }
    });
}

  
  

// Vérification toutes les 2 minutes
setInterval(checkForUpdate, 120000);
setInterval(checkAgendaUpdate, 120000);
setInterval(checkTravauxUpdate, 120000);
setInterval(checkElusUpdate, 120000);
setInterval(checkInfosUpdate, 120000);
  

  loadNews();
  loadAgenda();
  loadTravaux();
  loadElus();
  loadInfos();
  
</script>

</body>
</html>
